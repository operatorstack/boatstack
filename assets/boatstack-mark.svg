<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title description">
  <title id="title">Boatstack</title>
  <desc id="description">A rounded ink field with three stacked bars — the repository-owned delivery stack.</desc>
  <style>
    .ink{fill:#0F172A}
    .blue{fill:#2563EB}
    .cut{fill:#FFFFFF}
    @media(prefers-color-scheme:dark){
      .ink{fill:#E2E8F0}
      .cut{fill:#0F172A}
    }
  </style>
  <rect class="ink" x="2" y="2" width="60" height="60" rx="16"/>
  <rect class="blue" x="14" y="15" width="36" height="8" rx="2.5"/>
  <rect class="cut" x="14" y="28" width="36" height="8" rx="2.5"/>
  <rect class="blue" x="14" y="41" width="36" height="8" rx="2.5"/>
</svg>
